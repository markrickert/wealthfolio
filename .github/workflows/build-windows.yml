name: Build Windows Installer

# On-demand Windows build for testing branches. Produces the NSIS installer
# as a workflow artifact — no tag, no GitHub release. Pick the branch and
# target from the "Run workflow" dropdown.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Windows target"
        type: choice
        default: aarch64-pc-windows-msvc
        options:
          - aarch64-pc-windows-msvc
          - x86_64-pc-windows-msvc

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        run: rustup target add ${{ inputs.target }}

      - name: pnpm Setup
        uses: pnpm/action-setup@v4

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          # Reuse the caches warmed on main by cache-warm.yml.
          shared-key: release-${{ inputs.target == 'aarch64-pc-windows-msvc' && 'windows-aarch64' || 'windows-x86_64' }}
          save-if: false

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build the app (no release)
        uses: tauri-apps/tauri-action@v0
        env:
          CONNECT_AUTH_URL: ${{ vars.CONNECT_AUTH_URL }}
          CONNECT_AUTH_PUBLISHABLE_KEY: ${{ vars.CONNECT_AUTH_PUBLISHABLE_KEY }}
          CONNECT_API_URL: ${{ vars.CONNECT_API_URL }}
          CONNECT_OAUTH_CALLBACK_URL: ${{ vars.CONNECT_OAUTH_CALLBACK_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target ${{ inputs.target }} --bundles nsis

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: wealthfolio-${{ inputs.target }}-nsis
          path: target/${{ inputs.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7
